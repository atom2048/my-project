name: OpenCode Agent

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install OpenCode
        run: npm install -g opencode-ai
      - name: Run OpenCode Agent with opencode-go
        run: |
          echo "Running opencode agent for ${{ github.event_name }} event..."
          opencode github run --log-level DEBUG || true
          echo "--- Debug log ---"
          cat /home/runner/.local/share/opencode/log/*.log 2>/dev/null || echo "No log file found"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: opencode-go/kimi-k2.6
